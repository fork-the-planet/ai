packages:
  - ./demos/*
  - ./demos/remote-mcp-auth0/*
  - ./examples/*
  - ./packages/*
  - "!./demos/remote-mcp-auth0"
  - "!./demos/remote-mcp-auth0/docs"
allowBuilds:
  "@google/genai": true
  "@mongodb-js/zstd": true
  "@openrouter/sdk": true
  "@tailwindcss/oxide": true
  bufferutil: true
  core-js-pure: true
  esbuild: true
  msw: true
  node-liblzma: true
  nx: true
  protobufjs: true
  sharp: true
  utf-8-validate: true
  workerd: true
minimumReleaseAgeExclude:
  - "@ai-sdk/fireworks@2.0.56"
  - '@cloudflare/workers-types@4.20260628.1'
  - "@microsoft/api-extractor@7.58.9"
  - "@rushstack/ts-command-line@5.3.10"
  - '@mantine/charts@9.4.1'
  - '@mantine/code-highlight@9.4.1'
  - '@mantine/core@9.4.1'
  - '@mantine/dates@9.4.1'
  - '@mantine/form@9.4.1'
  - '@mantine/hooks@9.4.1'
  - '@mantine/modals@9.4.1'
  - '@mantine/notifications@9.4.1'
  - '@mantine/store@9.4.1'
  - '@openrouter/sdk@0.13.21'
  - agents@0.17.1
  - lucide-react@1.22.0
  - postcss@8.5.16
patchedDependencies:
  "@ai-sdk/google-vertex": patches/@ai-sdk__google-vertex.patch
